<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeggiate Romane - Cristina di Svezia</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* =========================================
           1. VARIABILI E COLORI (TEMA CRISTINA)
           ========================================= */
        :root {
            --primary: #5d1010;   /* Bordeaux Regale */
            --accent: #a68a56;    /* Oro Barocco */
            --bg: #fdfcf0;        /* Crema Antico */
            --dark: #2a0505;      /* Nero Velluto */
            --white: #ffffff;
            --shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Georgia', serif;
            background-color: var(--bg);
            margin: 0;
            color: #333;
            line-height: 1.6;
        }

        /* =========================================
           2. NAVBAR SUPERIORE
           ========================================= */
        #navbar {
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary) 100%);
            color: var(--accent);
            padding: 0 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        #navbar h1 { font-size: 1.6em; margin: 0; letter-spacing: 1px; }

        #nav-buttons button {
            background: rgba(166, 138, 86, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 8px 20px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Georgia', serif;
            font-weight: bold;
        }

        #nav-buttons button:hover {
            background: var(--accent);
            color: var(--white);
        }

        /* =========================================
           3. HOME PAGE (SCELTA ITINERARI)
           ========================================= */
        #home-view {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 70px);
        }

        #home-view h2 {
            text-align: center;
            font-size: 2.8em;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 50px;
            font-style: italic;
            font-size: 1.2em;
        }

        .itinerari-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
        }

        .itinerario-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s;
            cursor: pointer;
            border: 1px solid rgba(166, 138, 86, 0.2);
        }

        .itinerario-card:hover { transform: translateY(-10px); }

        .card-image {
    height: 250px;
    background-size: contain; /* <--- Fa entrare tutta la foto */
    background-repeat: no-repeat;
    background-position: center;
    background-color: #1a0303; /* Uno sfondino scuro elegante */
    position: relative;
}

        .card-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--primary);
            color: var(--white);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            border: 1px solid var(--accent);
        }

        .card-content { padding: 30px; }
        .card-content h3 { color: var(--primary); font-size: 1.6em; margin: 0 0 10px 0; }
        
        .card-stats {
            display: flex;
            justify-content: space-around;
            padding: 20px 0 0 0;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        .stat { text-align: center; }
        .stat-value { color: var(--primary); font-weight: bold; font-size: 1.3em; display: block; }
        .stat-label { font-size: 0.8em; color: #999; text-transform: uppercase; }

        /* =========================================
           4. VISTA ITINERARIO E MAPPA
           ========================================= */
        #itinerary-view { height: calc(100vh - 70px); }
#itinerary-view.active { display: flex; }

        #timeline-sidebar {
            width: 320px;
            background: linear-gradient(180deg, var(--dark) 0%, var(--primary) 100%);
            color: var(--white);
            padding: 25px;
            overflow-y: auto;
            border-right: 3px solid var(--accent);
        }

        #itinerary-content { flex: 1; display: flex; flex-direction: column; }
        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }

        #tappa-details {
            height: 45%;
            background: var(--white);
            padding: 30px 40px;
            overflow-y: auto;
            border-top: 4px solid var(--accent);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }

        /* =========================================
           5. DETTAGLI TAPPA E SEZIONI COMPLESSE
           ========================================= */
        .esperienza-section {
            margin: 25px 0;
            padding: 20px;
            background: #fdfaf4;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }
        
        .esperienza-section h3 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .music-player {
            background: linear-gradient(135deg, var(--primary) 0%, var(--dark) 100%);
            padding: 20px;
            border-radius: 8px;
            color: var(--white);
            margin: 20px 0;
            border: 1px solid var(--accent);
        }

        .citazione-box {
            background: #fffdf5;
            border-left: 4px solid var(--primary);
            padding: 20px;
            font-style: italic;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 1.1em;
            color: #555;
        }

        .atmosfera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .atmosfera-item {
            background: var(--white);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        /* =========================================
           6. TIMELINE E NAVIGAZIONE
           ========================================= */
        .view { display: none; }
        .view.active { display: block; }
        
        .timeline-item {
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }

        .timeline-item:hover { background: rgba(255,255,255,0.1); }
        .timeline-item.current { border-left-color: var(--accent); background: rgba(166, 138, 86, 0.2); }
        
        .nav-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Georgia', serif;
            font-size: 1em;
            transition: 0.3s;
        }

        .btn-next { background: var(--primary); color: var(--white); margin-left: auto; }
        .btn-next:hover { background: var(--dark); }
        .btn-prev { background: #95a5a6; color: var(--white); margin-right: 15px; }
        .btn-prev:hover { background: #7f8c8d; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        /* Icone mappa senza sfondo bianco */
        .custom-marker { background: transparent; border: none; }
        .spostamento-badge { background: #e8f4f8; color: #2980b9; padding: 10px 15px; border-radius: 8px; margin-bottom: 20px; display: inline-block; font-weight: bold; font-family: sans-serif; font-size: 0.9em; border: 1px solid #b3d7e8; }
        .metadata-box { background: #fdfaf4; border: 1px solid var(--accent); padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 0.9em; border-left: 4px solid var(--accent); }
    </style>
</head>
<body>

    <div id="navbar">
        <h1>🏛️ Passeggiate Romane</h1>
        <div id="nav-buttons">
            <button onclick="showView('home')">Home</button>
            <button id="back-to-itinerary-btn" onclick="showView('itinerary')" style="display:none;">Torna all'Itinerario</button>
        </div>
    </div>

    <div id="home-view" class="view active">
        <h2>Itinerari Tematici</h2>
        <p class="subtitle">Scopri Roma attraverso i segreti della Regina Cristina di Svezia</p>
        <div id="itinerari-container" class="itinerari-grid">
            </div>
    </div>

    <div id="itinerary-view" class="view">
        
        <div id="timeline-sidebar">
            <div style="font-weight:bold; color:var(--accent); font-size:1.2em; margin-bottom:15px; letter-spacing:1px; text-transform:uppercase;">Timeline Percorso</div>
            <div id="progress-bar" style="background:rgba(255,255,255,0.2); height:6px; border-radius:3px; margin-bottom:20px; overflow:hidden;">
                <div id="progress-fill" style="background:var(--accent); height:100%; width:0%; transition:0.5s;"></div>
            </div>
            <div id="timeline-items">
                </div>
        </div>
        
        <div id="itinerary-content">
            <div id="map-container">
                <div id="map"></div>
            </div>
            
            <div id="tappa-details">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #eee; padding-bottom:15px; margin-bottom:20px;">
                    <div>
                        <h2 id="tappa-nome" style="color:var(--primary); margin:0; font-size:2em;"></h2>
                        <p id="tappa-desc-breve" style="color:#7f8c8d; margin:5px 0 0 0; font-style:italic; font-size:1.1em;"></p>
                    </div>
                    <div style="text-align:right;">
                        <div id="tappa-orario-time" style="color:var(--primary); font-weight:bold; font-size:1.8em;"></div>
                        <div id="tappa-orario-moment" style="color:#999; font-size:1em; text-transform:capitalize;"></div>
                    </div>
                </div>

                <div id="tappa-content"></div>

                <div style="display:flex; margin-top:30px; padding-top:20px; border-top:1px solid #eee;">
                    <button class="nav-btn btn-prev" onclick="previousTappa()">← Tappa Precedente</button>
                    <button class="nav-btn btn-next" onclick="nextTappa()">Tappa Successiva →</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Variabili Globali
        let itinerariData = null;
        let currentItinerario = null;
        let currentTappaIndex = 0;
        let map = null;
        let markers = [];
        let routeLine = null;

        // Dizionario Emoji per i momenti della giornata
        const momentIcons = { 
            'alba': '🌅', 
            'mattino': '☀️', 
            'mezzogiorno': '🌞', 
            'pomeriggio': '🌤️', 
            'tramonto': '🌆', 
            'sera': '🌃' 
        };

        // 1. Inizializzazione
        async function init() {
            await loadData();
            renderHome();
        }

        // 2. Caricamento Dati (Tenta dal JSON, se fallisce usa i dati interni)
        async function loadData() {
    try {
        const res = await fetch('data.json');
        const text = await res.text(); // <-- prima testo
        const data = JSON.parse(text); // <-- qui intercetti errore
        
        itinerariData = data.itinerari;

    } catch (error) {
        console.error("Errore JSON:", error);
        console.warn("Uso dati embedded");
        itinerariData = getEmbeddedData();
    }
}
        // 3. Stampa le Card nella Home
        function renderHome() {
            const container = document.getElementById('itinerari-container');
            if(!itinerariData) return;
            
            container.innerHTML = '';
            itinerariData.forEach(it => {
                const card = document.createElement('div');
                card.className = 'itinerario-card';
                card.onclick = () => startItinerario(it.id);
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${it.immagine_copertina || ''}')">
                        <div class="card-badge">${it.categoria || 'Percorso Culturale'}</div>
                    </div>
                    <div class="card-content">
                        <h3>${it.nome}</h3>
                        <p style="color:#7f8c8d; font-style:italic; margin-bottom:15px;">${it.sottotitolo || ''}</p>
                        <p>${it.descrizione || ''}</p>
                        <div class="card-stats">
                            <div class="stat"><span class="stat-value">⏱️ ${it.durata_totale_ore || 0}h</span><span class="stat-label">Durata</span></div>
                            <div class="stat"><span class="stat-value">📍 ${(it.tappe || []).length}</span><span class="stat-label">Tappe</span></div>
                            <div class="stat"><span class="stat-value">🚶 ${it.distanza_totale_km || 0}km</span><span class="stat-label">Distanza</span></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 4. Avvia l'itinerario selezionato
        function startItinerario(id) {
            currentItinerario = itinerariData.find(it => it.id === id);
            if(!currentItinerario) return;
            
           showView('itinerary');
            
            // QUESTA RIGA È FONDAMENTALE PER FAR APPARIRE IL BOX!
            renderGeneralInfo(); 

            setTimeout(() => {
                initMap();
                loadTappa(0);
            }, 300);
        }

        // 5. Inizializza la Mappa Leaflet
        function initMap() {
            if (map) map.remove();
            map = L.map('map').setView([41.90, 12.47], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            
            const coords = [];
            markers = [];

            // Disegna i Marker con le Emoji
            currentItinerario.tappe.forEach((t, i) => {
                if (t.coordinate && t.coordinate.length === 2) {
                    coords.push(t.coordinate);
                    const iconEmoji = momentIcons[t.momento_giornata] || '📍';
                    
                    const customIcon = L.divIcon({
                        html: `<div style="font-size: 2.5em; text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.3);">${iconEmoji}</div>`,
                        className: 'custom-marker',
                        iconSize: [40, 40],
                        iconAnchor: [20, 20]
                    });

                    const marker = L.marker(t.coordinate, {icon: customIcon}).addTo(map);
                    marker.bindPopup(`<b>Tappa ${t.numero}</b><br>${t.nome}`);
                    marker.on('click', () => loadTappa(i));
                    markers.push(marker);
                } else {
                    markers.push(null);
                }
            });

            // Disegna la linea del percorso
            if (coords.length > 0) {
                routeLine = L.polyline(coords, {color: '#5d1010', weight: 5, opacity: 0.8, dashArray: '8, 8'}).addTo(map);
                map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
            }
        }

        // 6. Carica i dati della singola Tappa
        function loadTappa(index) {
            if(!currentItinerario || !currentItinerario.tappe[index]) return;
            
            currentTappaIndex = index;
            const tappa = currentItinerario.tappe[index];
            
            // Popola i testi di base nell'intestazione
            document.getElementById('tappa-nome').textContent = `${tappa.numero}. ${tappa.nome}`;
            document.getElementById('tappa-desc-breve').textContent = tappa.descrizione_breve || '';
            
            const iconEmoji = momentIcons[tappa.momento_giornata] || '';
            document.getElementById('tappa-orario-time').textContent = tappa.orario_consigliato || '';
            document.getElementById('tappa-orario-moment').textContent = `${iconEmoji} ${tappa.momento_giornata || ''}`;

            // Costruisci il contenuto complesso (Storia, Musica, ecc.)
            renderTappaContent(tappa);
            
            // Aggiorna Timeline a sinistra
            updateTimeline();
            
            // Muovi la mappa
            if (tappa.coordinate && tappa.coordinate.length === 2) {
                map.setView(tappa.coordinate, 16, {animate: true, duration: 0.5});
                if (markers[index]) markers[index].openPopup();
            }
            
            // Aggiorna bottoni
            document.querySelector('.btn-prev').disabled = index === 0;
            document.querySelector('.btn-next').disabled = index === currentItinerario.tappe.length - 1;
        }
function renderGeneralInfo() {
            const sidebar = document.getElementById('timeline-sidebar');
            
            // Rimuoviamo box vecchi se esistono per evitare doppioni
            const oldBox = document.getElementById('general-info-box');
            if(oldBox) oldBox.remove();

            const infoBox = document.createElement('div');
            infoBox.id = 'general-info-box';
            infoBox.style = "margin-bottom: 25px; padding: 15px; background: rgba(0,0,0,0.25); border-radius: 8px; font-size: 0.85em; border: 1px solid rgba(166, 138, 86, 0.4); box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);";
            
            const it = currentItinerario;
            
            infoBox.innerHTML = `
                <div style="font-weight:bold; color:var(--accent); margin-bottom:12px; text-transform:uppercase; border-bottom: 1px solid rgba(166, 138, 86, 0.3); padding-bottom:5px; font-size:1.1em;">
                    ℹ️ Info Generali
                </div>
                
                ${it.costo_stimato ? `<div style="margin-bottom:8px;"><strong>💰 Costo:</strong> <span style="opacity:0.9;">${it.costo_stimato}</span></div>` : ''}
                
                ${it.migliore_periodo_anno ? `<div style="margin-bottom:8px;"><strong>📅 Periodo:</strong> <span style="opacity:0.9;">${it.migliore_periodo_anno}</span></div>` : ''}
                
                ${it.accessibilita ? `<div style="margin-bottom:8px;"><strong>♿ Accessibilità:</strong> <span style="opacity:0.9;">${it.accessibilita}</span></div>` : ''}
                
                ${it.note_logistiche ? `<div style="margin-bottom:12px;"><strong>🚶 Logistica:</strong> <span style="opacity:0.9;">${it.note_logistiche}</span></div>` : ''}
                
                ${it.consigli_pratici && it.consigli_pratici.length > 0 ? `
                    <div style="font-weight:bold; color:var(--accent); margin:15px 0 5px 0;">💡 Consigli Pratici</div>
                    <ul style="padding-left:15px; margin:0 0 12px 0; opacity:0.9;">
                        ${it.consigli_pratici.map(c => `<li>${c}</li>`).join('')}
                    </ul>
                ` : ''}

                ${it.cosa_portare && it.cosa_portare.length > 0 ? `
                    <div style="font-weight:bold; color:var(--accent); margin:10px 0 5px 0;">🎒 Cosa portare</div>
                    <div style="opacity:0.9;">${it.cosa_portare.join(', ')}</div>
                ` : ''}
            `;
            
            // Lo inseriamo nella sidebar subito prima della scritta "TIMELINE PERCORSO"
            const progressBar = document.getElementById('progress-bar');
            sidebar.insertBefore(infoBox, progressBar.previousElementSibling);
        }
       // 7. Renderizza le sezioni complesse (Il Cuore dell'Esame)
        function renderTappaContent(tappa) {
            const container = document.getElementById('tappa-content');
            container.innerHTML = '';

            // 1. Badge Spostamento
            if (tappa.tempo_spostamento_da_tappa_precedente) {
                const sp = tappa.tempo_spostamento_da_tappa_precedente;
                container.innerHTML += `<div class="spostamento-badge">🚶‍♂️ Da tappa precedente: ${sp.a_piedi} (${sp.distanza_km} km)</div>`;
            } else if (tappa.indicazioni_arrivo) {
                container.innerHTML += `<div class="spostamento-badge">🚇 Arrivo: ${tappa.indicazioni_arrivo}</div>`;
            }

            // 2. Sezione Base: Descrizione, Storia e Curiosità
            if (tappa.descrizione) {
                container.innerHTML += `<p style="font-size: 1.1em; margin-bottom: 25px;">${tappa.descrizione}</p>`;
            }
            
            if (tappa.storia || tappa.curiosita) {
                let html = `<div class="esperienza-section"><h3>📜 Storia e Curiosità</h3>`;
                if (tappa.storia) html += `<p><strong>Storia:</strong> ${tappa.storia}</p>`;
                if (tappa.curiosita) html += `<p><strong>Curiosità:</strong> ${tappa.curiosita}</p>`;
                html += `</div>`;
                container.innerHTML += html;
            }

            // 3. Esperienza Culturale (Musica, Letteratura, Atmosfera, Arte)
            const exp = tappa.esperienza_culturale || {};
            const musicaData = tappa.musica || exp.musica; // Supporta SIA il nostro JSON che quello del prof!
            
            // 3. Musica (Player MP3 + Link YouTube)
            
            if (musicaData) {
                let audioPlayer = musicaData.file_audio ? 
                    `<audio controls style="width: 100%; margin-top: 15px; border-radius: 5px;"><source src="${musicaData.file_audio}"></audio>` : '';
                
                let youtubeButton = musicaData.youtube_url ? 
                    `<a href="${musicaData.youtube_url}" target="_blank" style="display: inline-block; margin-top: 10px; padding: 8px 15px; background: #ff0000; color: white; text-decoration: none; border-radius: 5px; font-size: 0.9em; font-weight: bold; font-family: sans-serif; transition: 0.3s;">▶️ Vedi su YouTube</a>` : '';

                let extraMusica = '';
                if (musicaData.compositore) extraMusica += `<strong>Compositore:</strong> ${musicaData.compositore}<br>`;
                if (musicaData.note_ascolto) extraMusica += `<strong>🎧 Consiglio:</strong> ${musicaData.note_ascolto}`;

                container.innerHTML += `
                    <div class="music-player">
                        <h4 style="margin-top:0;">🎵 ${musicaData.movimento || 'Esperienza Sonora'}</h4>
                        <p style="margin-bottom:10px; font-size:0.95em; opacity:0.9;">${musicaData.descrizione_musicale || ''}</p>
                        <div style="font-size: 0.85em; opacity: 0.8;">${extraMusica}</div>
                        ${audioPlayer}
                        <div style="margin-top: 10px;">${youtubeButton}</div>
                    </div>
                `;
            }
                
            // Letteratura
            if (exp.letteratura) {
                container.innerHTML += `
                    <div class="citazione-box">
                        <p>"${exp.letteratura.citazione}"</p>
                        <div style="text-align:right; font-size:0.9em; color:#7f8c8d;">
                            — ${exp.letteratura.autore}, <em>${exp.letteratura.opera}</em>
                        </div>
                    </div>
                `;
            }

            // Atmosfera
            if (exp.atmosfera) {
                container.innerHTML += `
                    <div class="esperienza-section">
                        <h3>🌤️ Atmosfera del Luogo</h3>
                        <div class="atmosfera-grid">
                            <div class="atmosfera-item"><div style="font-size:1.5em; margin-bottom:5px;">💡</div><b>Luce</b><br>${exp.atmosfera.luce || 'N/A'}</div>
                            <div class="atmosfera-item"><div style="font-size:1.5em; margin-bottom:5px;">😌</div><b>Emozione</b><br>${exp.atmosfera.emozione_target || 'N/A'}</div>
                            <div class="atmosfera-item"><div style="font-size:1.5em; margin-bottom:5px;">👥</div><b>Affollamento</b><br>${exp.atmosfera.affollamento || 'N/A'}</div>
                        </div>
                    </div>
                `;
            }

            // Arte Visiva
            if (exp.arte_visiva) {
                container.innerHTML += `
                    <div class="esperienza-section">
                        <h3>🎨 Dettagli Artistici</h3>
                        <p><strong>Stile:</strong> ${exp.arte_visiva.stile_architettonico || 'Non specificato'}</p>
                        <p><strong>Architetto/Scultore:</strong> ${exp.arte_visiva.architetto || exp.arte_visiva.scultore || 'Ignoto'}</p>
                        <p>${exp.arte_visiva.descrizione || ''}</p>
                    </div>
                `;
            }

            // 4. Info Pratiche (Metadata)
            if (tappa.metadata) {
                const meta = tappa.metadata;
                container.innerHTML += `
                    <div class="metadata-box">
                        <strong style="color:var(--primary); font-size:1.1em; margin-bottom:10px; display:block;">ℹ️ Info Pratiche</strong>
                        <strong>Costo:</strong> ${meta.accessibilita || 'N/A'}<br>
                        <strong>Orari:</strong> ${meta.orari_standard || 'N/A'}<br>
                        <strong>Servizi:</strong> ${(meta.servizi || []).join(', ') || 'N/A'}
                    </div>
                `;
            }
        }
        // 8. Aggiorna la Timeline laterale
        function updateTimeline() {
            const tl = document.getElementById('timeline-items');
            tl.innerHTML = currentItinerario.tappe.map((t, i) => {
                const iconEmoji = momentIcons[t.momento_giornata] || '';
                return `
                <div class="timeline-item ${i === currentTappaIndex ? 'current' : ''}" onclick="loadTappa(${i})">
                    <span style="color:var(--accent); font-weight:bold; font-size:1.1em;">
                        ${iconEmoji} ${t.orario_consigliato || ''}
                    </span><br>
                    <span style="font-size:1.05em; display:inline-block; margin-top:5px;">${t.nome}</span>
                </div>
                `;
            }).join('');
            
            const progress = ((currentTappaIndex + 1) / currentItinerario.tappe.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        // 9. Utility per scambiare le visualizzazioni
        function showView(name) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(name + '-view').classList.add('active');
            document.getElementById('back-to-itinerary-btn').style.display = name === 'itinerary' ? 'inline-block' : 'none';
        }

        function nextTappa() { if (currentTappaIndex < currentItinerario.tappe.length - 1) loadTappa(currentTappaIndex + 1); }
        function previousTappa() { if (currentTappaIndex > 0) loadTappa(currentTappaIndex - 1); }
