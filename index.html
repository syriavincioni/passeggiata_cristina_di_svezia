<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passeggiate Romane - Itinerari Tematici</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
    /* === COLORI E STRUTTURA REGALE === */
    :root {
        --primary-regal: #5d1010; 
        --gold-accent: #a68a56;   
        --cream-bg: #fdfcf0;      
        --dark-velvet: #2a0505;   
    }

    body {
        font-family: 'Georgia', serif;
        background-color: var(--cream-bg);
        margin: 0;
        overflow: hidden; /* Per non avere doppie barre di scorrimento */
    }

    /* === NAVBAR === */
    #navbar {
        background: linear-gradient(135deg, var(--primary-regal) 0%, var(--dark-velvet) 100%);
        color: #f1d592;
        padding: 10px 25px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        border-bottom: 3px solid var(--gold-accent);
        height: 60px;
        box-sizing: border-box;
    }

    #navbar h1 { font-size: 1.4em; color: var(--gold-accent); margin: 0; }

    #nav-buttons button {
        background: rgba(166, 138, 86, 0.2);
        color: #f1d592;
        border: 1px solid var(--gold-accent);
        padding: 5px 15px;
        border-radius: 4px;
        cursor: pointer;
    }

    /* === VIEWS === */
    .view { display: none; }
    .view.active { display: block; }

    /* === HOME VIEW === */
    #home-view { padding: 40px; max-width: 1200px; margin: 0 auto; color: var(--text-main); height: calc(100vh - 60px); overflow-y: auto; }
    .itinerari-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
    .itinerario-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #ddd; }

    /* === ITINERARY VIEW (QUI C'È LA MAPPA!) === */
    #itinerary-view {
        display: flex;
        height: calc(100vh - 60px); /* Fondamentale per vedere la mappa */
    }

    #timeline-sidebar {
        width: 300px;
        background: linear-gradient(180deg, var(--dark-velvet) 0%, var(--primary-regal) 100%);
        color: white;
        padding: 20px;
        overflow-y: auto;
        border-right: 2px solid var(--gold-accent);
    }

    #itinerary-content {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    #map-container {
        flex: 1; /* Questo fa sì che la mappa occupi lo spazio sopra */
        position: relative;
    }

    #map { width: 100%; height: 100%; } /* Senza questo la mappa è invisibile */

    #tappa-details {
        height: 35%; /* La parte bianca sotto la mappa */
        background: white;
        padding: 20px;
        overflow-y: auto;
        border-top: 3px solid var(--gold-accent);
    }

    /* === DETTAGLI TAPPA === */
    #tappa-numero { color: var(--gold-accent); font-size: 2.5em; font-weight: bold; }
    .nav-btn.next { background: var(--primary-regal); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    
    /* Timeline items */
    .timeline-item { padding: 10px; margin-bottom: 10px; border-radius: 5px; cursor: pointer; border-left: 3px solid transparent; }
    .timeline-item.current { border-left-color: var(--gold-accent); background: rgba(166,138,86,0.2); }
</style>
</head>
<body>
    <!-- Navigation Bar -->
    <div id="navbar">
        <h1>🏛️ Passeggiate Romane</h1>
        <div id="nav-buttons">
            <button onclick="showView('home')">Home</button>
            <button id="back-to-itinerary-btn" onclick="showView('itinerary')" style="display:none;">Torna all'Itinerario</button>
        </div>
    </div>
    
    <!-- HOME VIEW: Selezione Itinerario -->
    <div id="home-view" class="view active">
        <h2>Itinerari Tematici</h2>
        <p class="subtitle">Scopri Roma attraverso passeggiate culturali guidate da personaggi storici</p>
        
        <div id="itinerari-container" class="itinerari-grid">
            <!-- Le card degli itinerari saranno generate dinamicamente -->
        </div>
    </div>
    
    <!-- ITINERARY VIEW: Visualizzazione Percorso -->
    <div id="itinerary-view" class="view">
        <!-- Timeline Sidebar -->
        <div id="timeline-sidebar">
            <div id="timeline-title">Timeline Itinerario</div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
            <div id="timeline-items">
                <!-- Timeline items generati dinamicamente -->
            </div>
        </div>
        
        <!-- Main Content -->
        <div id="itinerary-content">
            <!-- Mappa -->
            <div id="map-container">
                <div id="map"></div>
            </div>
            
            <!-- Dettagli Tappa -->
            <div id="tappa-details">
                <div id="tappa-header">
                    <div id="tappa-numero"></div>
                    <div id="tappa-nome">
                        <h2></h2>
                        <p class="descrizione-breve"></p>
                    </div>
                    <div id="tappa-orario">
                        <div class="time"></div>
                        <div class="moment"></div>
                    </div>
                </div>
                
                <div id="tappa-content">
                    <!-- Contenuto dinamico -->
                </div>
                
                <div id="tappa-navigation">
                    <button class="nav-btn prev" onclick="previousTappa()">← Tappa Precedente</button>
                    <button class="nav-btn next" onclick="nextTappa()">Tappa Successiva →</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ========================================
        // VARIABILI GLOBALI
        // ========================================
        let itinerariData = null;
        let currentItinerario = null;
        let currentTappaIndex = 0;
        let map = null;
        let markers = [];
        let routeLine = null;
        
        // Icone momenti della giornata
        const momentIcons = {
            'alba': '🌅',
            'mattino': '☀️',
            'mezzogiorno': '🌞',
            'pomeriggio': '🌤️',
            'tramonto': '🌆',
            'sera': '🌃'
        };
        
        // ========================================
        // INIZIALIZZAZIONE
        // ========================================
        async function init() {
            console.log('🚀 Inizializzazione Passeggiate Romane...');
            await loadItinerariData();
            renderItinerariCards();
        }
        
        // ========================================
        // CARICAMENTO DATI
        // ========================================
        async function loadItinerariData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('File non trovato');
                
                const data = await response.json();
                itinerariData = data.itinerari;
                console.log(`✅ Caricati ${itinerariData.length} itinerari`);
            } catch (error) {
                console.error('❌ Errore caricamento:', error);
                // Fallback: usa dati embedded
                itinerariData = getEmbeddedItinerari();
            }
        }
        
        function getEmbeddedItinerari() {
            // Versione semplificata embedded come fallback
            return [{
    "id": "cristina_svezia_roma",
    "nome": "La Roma di Cristina di Svezia",
    "sottotitolo": "Un viaggio barocco tra arte e libertà",
    "personaggio": { "nome": "Cristina di Svezia", "anni": "1626-1689" },
    "descrizione": "Segui i passi della Regina ribelle attraverso i suoi luoghi preferiti a Roma.",
    "durata_totale_ore": 6,
    "distanza_totale_km": 4.2,
    "tappe": [
        {
            "numero": 1,
            "nome": "Porta del Popolo",
            "coordinate": [41.9115, 12.4765],
            "orario_consigliato": "09:00",
            "momento_giornata": "mattino",
            "durata_visita_min": 45,
            "emozione_target": "trionfo",
            "descrizione_breve": "Porta del Popolo rappresenta l'ingresso trionfale di Cristina a Roma nel dicembre del 1655. Per accogliere la regina da poco convertita, Papa Alessandro VII commissionò a Gian Lorenzo Bernini il restauro della facciata interna. L'architetto vi incise il celebre messaggio di benvenuto: 'Felici faustoque ingressui'. Questo varco monumentale simboleggia l'inizio della sua nuova vita romana, accolta con uno sfarzo senza precedenti."
        },
        {
            "numero": 2,
            "nome": "Pantheon",
            "coordinate": [41.8986, 12.4769],
            "orario_consigliato": "12:00",
            "momento_giornata": "mezzogiorno",
            "durata_visita_min": 30,
            "emozione_target": "meraviglia",
            "descrizione_breve": "Il Pantheon incarna l'immortalità della Roma classica che Cristina tanto ammirava. La regina era un'avida collezionista di sculture antiche e amava circondarsi della maestosità degli imperatori del passato. Questo tempio, con la sua cupola perfetta, rappresentava per lei il legame indissolubile tra la grandezza del passato e l'ambizione del presente."
        },
        {
            "numero": 3,
            "nome": "Galleria Corsini",
            "coordinate": [41.8932, 12.4665],
            "orario_consigliato": "16:00",
            "momento_giornata": "pomeriggio",
            "durata_visita_min": 90,
            "emozione_target": "ispirazione",
            "descrizione_breve": "Palazzo Corsini alla Lungara divenne la sua dimora definitiva. Qui Cristina fondò la sua accademia e trasformò i saloni in un crocevia per le menti più brillanti d'Europa. Tra queste mura, circondata da una sterminata collezione d'arte e libri, la Regina esercitò il suo potere culturale, patrocinando artisti del calibro di Arcangelo Corelli."
        },
        {
            "numero": 4,
            "nome": "Orto Botanico",
            "coordinate": [41.8925, 12.4622],
            "orario_consigliato": "21:00",
            "momento_giornata": "sera",
            "durata_visita_min": 60,
            "emozione_target": "mistero",
            "descrizione_breve": "Situato nel parco retrostante il palazzo, l'Orto Botanico rappresenta il lato più esoterico della sovrana. Appassionata di scienze naturali e alchimia, Cristina amava ritirarsi in questi giardini per approfondire studi che andavano oltre le convenzioni del tempo. Qui, tra il verde e il silenzio, si rifletteva sulla natura e sui segreti della materia."
        }
    ]
}]
        }
        
        // ========================================
        // RENDERING HOME
        // ========================================
        function renderItinerariCards() {
            const container = document.getElementById('itinerari-container');
            container.innerHTML = '';
            
            itinerariData.forEach(itinerario => {
                const card = document.createElement('div');
                card.className = 'itinerario-card';
                card.onclick = () => startItinerario(itinerario.id);
                
                card.innerHTML = `
<div class="card-image" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1525874684015-58379d421a52?auto=format&fit=crop&w=600&q=80')">                        <div class="card-badge">${itinerario.tema || 'Culturale'}</div>
                    </div>
                    <div class="card-content">
                        <h3>${itinerario.nome}</h3>
                        
                        <p class="card-subtitle">${itinerario.sottotitolo || ''}</p>
                        <p class="card-description">${itinerario.descrizione}</p>
                        
                        <div class="card-stats">
                            <div class="stat">
                                <div class="stat-value">⏱️ ${itinerario.durata_totale_ore}h</div>
                                <div class="stat-label">Durata</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">📍 ${itinerario.tappe.length}</div>
                                <div class="stat-label">Tappe</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">🚶 ${itinerario.distanza_totale_km}km</div>
                                <div class="stat-label">Distanza</div>
                            </div>
                        </div>
                        
                        <button class="card-button">Inizia Passeggiata →</button>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // ========================================
        // START ITINERARIO
        // ========================================
        function startItinerario(itinerarioId) {
            currentItinerario = itinerariData.find(it => it.id === itinerarioId);
            if (!currentItinerario) return;
            
            currentTappaIndex = 0;
            
            showView('itinerary');
            initMap();
            renderTimeline();
            loadTappa(0);
        }
        
        // ========================================
        // GESTIONE VIEWS
        // ========================================
        function showView(viewName) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`${viewName}-view`).classList.add('active');
            
            const backBtn = document.getElementById('back-to-itinerary-btn');
            backBtn.style.display = viewName === 'itinerary' ? 'inline-block' : 'none';
        }
        
        // ========================================
        // MAPPA
        // ========================================
        function initMap() {
            if (map) map.remove();
            
            map = L.map('map').setView([41.9028, 12.4964], 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);
            
            drawRoute();
            addMarkers();
        }
        
        function drawRoute() {
            const coordinates = currentItinerario.tappe.map(t => t.coordinate);
            
            if (routeLine) map.removeLayer(routeLine);
            
            routeLine = L.polyline(coordinates, {
                color: '#e74c3c',
                weight: 4,
                opacity: 0.7,
                dashArray: '10, 10',
                lineJoin: 'round'
            }).addTo(map);
            
            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
        }
        
        function addMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            
            currentItinerario.tappe.forEach((tappa, index) => {
                const icon = momentIcons[tappa.momento_giornata] || '📍';
                
                const marker = L.marker(tappa.coordinate, {
                    icon: L.divIcon({
                        html: `<div style="font-size: 2em;">${icon}</div>`,
                        className: 'custom-marker',
                        iconSize: [40, 40]
                    })
                }).addTo(map);
                
                marker.bindPopup(`<b>Tappa ${tappa.numero}</b><br>${tappa.nome}`);
                marker.on('click', () => loadTappa(index));
                
                markers.push(marker);
            });
        }
        
        // ========================================
        // TIMELINE
        // ========================================
        function renderTimeline() {
            const container = document.getElementById('timeline-items');
            container.innerHTML = '';
            
            currentItinerario.tappe.forEach((tappa, index) => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                
                if (index < currentTappaIndex) item.classList.add('completed');
                else if (index === currentTappaIndex) item.classList.add('current');
                else item.classList.add('upcoming');
                
                item.onclick = () => loadTappa(index);
                
                item.innerHTML = `
                    <div class="timeline-icon">${momentIcons[tappa.momento_giornata]}</div>
                    <div class="timeline-time">${tappa.orario_consigliato}</div>
                    <div class="timeline-name">${tappa.nome}</div>
                    <div class="timeline-duration">${tappa.durata_visita_min} min</div>
                `;
                
                container.appendChild(item);
            });
            
            updateProgress();
        }
        
        function updateProgress() {
            const progress = ((currentTappaIndex + 1) / currentItinerario.tappe.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;
        }
        
        // ========================================
        // CARICA TAPPA
        // ========================================
        function loadTappa(index) {
            currentTappaIndex = index;
            const tappa = currentItinerario.tappe[index];
            
            // Header
            document.getElementById('tappa-numero').textContent = `${tappa.numero}`;
            document.querySelector('#tappa-nome h2').textContent = tappa.nome;
            document.querySelector('#tappa-nome .descrizione-breve').textContent = tappa.descrizione_breve || '';
            document.querySelector('#tappa-orario .time').textContent = tappa.orario_consigliato;
            document.querySelector('#tappa-orario .moment').textContent = tappa.momento_giornata;
            
            // Content
            renderTappaContent(tappa);
            
            // Timeline
            renderTimeline();
            
            // Mappa: centra su tappa corrente
            map.setView(tappa.coordinate, 16, { animate: true });
            markers[index].openPopup();
            
            // Buttons
            document.querySelector('.nav-btn.prev').disabled = index === 0;
            document.querySelector('.nav-btn.next').disabled = index === currentItinerario.tappe.length - 1;
        }
        
        function renderTappaContent(tappa) {
            const container = document.getElementById('tappa-content');
            container.innerHTML = '';
            
            // Storia e Curiosità
            if (tappa.storia || tappa.curiosita) {
                const storiaSec = document.createElement('div');
                storiaSec.className = 'esperienza-section';
                storiaSec.innerHTML = `
                    <h3>📜 Storia e Curiosità</h3>
                    ${tappa.storia ? `<p><strong>Storia:</strong> ${tappa.storia}</p>` : ''}
                    ${tappa.curiosita ? `<p><strong>Curiosità:</strong> ${tappa.curiosita}</p>` : ''}
                `;
                container.appendChild(storiaSec);
            }
            
            // Esperienza Culturale
            if (tappa.esperienza_culturale) {
                const exp = tappa.esperienza_culturale;
                
                // Musica
                if (exp.musica) {
                    const musicDiv = document.createElement('div');
                    musicDiv.className = 'music-player';
                    musicDiv.innerHTML = `
                        <h4>🎵 ${exp.musica.movimento || 'Brano Musicale'}</h4>
                        <audio controls>
                            <source src="audio/${tappa.poi_id}.mp3" type="audio/mpeg">
                            Il tuo browser non supporta l'audio.
                        </audio>
                        <div class="music-description">
                            ${exp.musica.descrizione_musicale || ''}
                        </div>
                    `;
                    container.appendChild(musicDiv);
                }
                
                // Letteratura
                if (exp.letteratura) {
                    const litDiv = document.createElement('div');
                    litDiv.className = 'citazione-box';
                    litDiv.innerHTML = `
                        <div class="citazione-text">"${exp.letteratura.citazione}"</div>
                        <div class="citazione-author">— ${exp.letteratura.autore}, <em>${exp.letteratura.opera}</em> (${exp.letteratura.anno})</div>
                    `;
                    container.appendChild(litDiv);
                }
                
                // Atmosfera
                if (exp.atmosfera) {
                    const atmDiv = document.createElement('div');
                    atmDiv.className = 'esperienza-section';
                    atmDiv.innerHTML = `
                        <h3>🌤️ Atmosfera del Luogo</h3>
                        <div class="atmosfera-grid">
                            <div class="atmosfera-item">
                                <div class="icon">💡</div>
                                <div class="label">Luce</div>
                                <div class="value">${exp.atmosfera.luce || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">🌡️</div>
                                <div class="label">Temperatura</div>
                                <div class="value">${exp.atmosfera.temperatura_stimata || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">👥</div>
                                <div class="label">Affollamento</div>
                                <div class="value">${exp.atmosfera.affollamento || 'N/A'}</div>
                            </div>
                            <div class="atmosfera-item">
                                <div class="icon">😌</div>
                                <div class="label">Emozione</div>
                                <div class="value">${exp.atmosfera.emozione_target || 'N/A'}</div>
                            </div>
                        </div>
                        ${exp.atmosfera.consiglio_fotografico ? `<p style="margin-top: 15px;"><strong>📸 Fotografia:</strong> ${exp.atmosfera.consiglio_fotografico}</p>` : ''}
                    `;
                    container.appendChild(atmDiv);
                }
            }
        }
        
        // ========================================
        // NAVIGAZIONE TAPPE
        // ========================================
        function previousTappa() {
            if (currentTappaIndex > 0) {
                loadTappa(currentTappaIndex - 1);
            }
        }
        
        function nextTappa() {
            if (currentTappaIndex < currentItinerario.tappe.length - 1) {
                loadTappa(currentTappaIndex + 1);
            }
        }
        
        // ========================================
        // AVVIO
        // ========================================
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
